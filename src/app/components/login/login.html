<div class="container-fluid vh-100 d-flex justify-content-center align-items-center bg-login">
  <div class="card shadow-lg p-4 login-card">
    <div class="card-body">
      <h2 class="text-center mb-2">Iniciar Sesión</h2>
      <p class="text-center text-muted mb-4">Bienvenido de nuevo</p>
      <form (ngSubmit)="login()">
        <div class="mb-3">
          <label class="form-label">Correo electrónico
          </label>
          <input type="email" class="form-control" placeholder="ejemplo@correo.com" [(ngModel)]="email" name="email" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Contraseña</label>

          <input type="password" class="form-control" placeholder="********" [(ngModel)]="contrasenia" name="contrasenia" required>
        </div>
        <button type="submit" class="btn btn-primary w-100"> Entrar </button>
      </form>
      <div class="text-center mt-4">
        <p class="mb-0">
          ¿No tienes cuenta?

          <a routerLink="/registrar" class="text-decoration-none fw-bold">
            Regístrate
          </a>
        </p>
      </div>
    </div>
  </div>
</div>

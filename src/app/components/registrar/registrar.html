<!-- register.component.html -->

<div class="container-fluid vh-100 d-flex justify-content-center align-items-center bg-register">

  <div class="card shadow-lg p-4 register-card">

    <div class="card-body">

      <h2 class="text-center mb-2">
        Crear Cuenta
      </h2>

      <p class="text-center text-muted mb-4">
        Regístrate para continuar
      </p>

      <form>

        <!-- Nombre -->
        <div class="mb-3">
          <label class="form-label">
            Nombre 
          </label>

          <input
            type="text"
            class="form-control"
            placeholder="Miguel"
          >
        </div>

        <div class="mb-3">
          <label class="form-label">
            Apellidos 
          </label>

          <input
            type="text"
            class="form-control"
            placeholder="Cervera Artal"
          >
        </div>

        <!-- Email -->
        <div class="mb-3">
          <label class="form-label">
            Correo electrónico
          </label>

          <input
            type="email"
            class="form-control"
            placeholder="ejemplo@correo.com"
          >
        </div>

        <!-- Password -->
        <div class="mb-3">
          <label class="form-label">
            Contraseña
          </label>

          <input
            type="password"
            class="form-control"
            placeholder="********"
          >
        </div>

        <!-- Confirm Password -->
        <div class="mb-4">
          <label class="form-label">
            Confirmar contraseña
          </label>

          <input
            type="password"
            class="form-control"
            placeholder="********"
          >
        </div>

        <!-- Terms -->
        <div class="form-check mb-4">

          <input
            class="form-check-input"
            type="checkbox"
            id="terms"
          >

          <label class="form-check-label" for="terms">
            Acepto los términos y condiciones
          </label>

        </div>

        <!-- Button -->
        <button
          type="submit"
          class="btn btn-primary w-100"
        >
          Registrarse
        </button>

      </form>

      <!-- Login -->
      <div class="text-center mt-4">

        <p class="mb-0">
          ¿Ya tienes cuenta?

          <a href="#" class="text-decoration-none fw-bold">
            Inicia sesión
          </a>
        </p>

      </div>

    </div>

  </div>

</div>
